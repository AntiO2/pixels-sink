syntax = "proto3";

package io.pixelsdb.pixels.sink.rpc;

option java_outer_classname = "PixelsPollingServiceProto";

// RPC 服务定义 - 服务名称更清晰地反映了轮询模式
service PixelsPollingService {
  // 定义一个简单的一问一答式 RPC，用于轮询
  // Flink Client 调用一次，Server 响应一次
  rpc PollEvents(PollRequest) returns (PollResponse);
}

// Flink Source 发送的请求
message PollRequest {
  string schema_name = 1;
  string table_name = 2;
}

// pixels-sink Server 返回的响应
message PollResponse {
  // 返回一个 CDC 事件列表。如果当前没有数据，这个列表可以为空。
  repeated RowRecord records = 1;
}

message ColumnValue {
  bytes value = 1;
}

message RowValue {
  repeated ColumnValue values = 1;
}

enum OperationType {
  INSERT = 0;
  UPDATE = 1;
  DELETE = 2;
  SNAPSHOT = 3;
}
// 传递给 Flink Source 的数据
message RowRecord {
  RowValue before = 1;
  RowValue after = 2;
  SourceInfo source = 3;
  OperationType op = 5;
}

message SourceInfo {
  string db = 1;
  string schema = 2;
  string table = 3;
}